<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頭痛予報 — BAROMETRIC MINIMAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #050709;
  --bg2: #10141f;
  --border:  rgba(80,120,255,0.10);
  --text-primary:   #dce8ff;
  --text-dim:       rgba(130,160,220,0.38);
  --accent-blue:   #4a8fff;
  --accent-cyan:   #00d4ff;
  --accent-green:  #00e5a0;
  --accent-orange: #ff8c42;
  --font-mono: 'Space Mono', monospace;
  --font-jp:   'Noto Sans JP', sans-serif;
  --r-md: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: transparent; }

.page {
  height: 100vh;
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  justify-content: center;
  align-items: center;
}

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.risk-pill {
  font-family: var(--font-jp); font-size: clamp(16px, 4vw, 24px); font-weight: 900;
  padding: 2px 12px; border-radius: 50px; border: 2px solid;
  margin-bottom: 4px;
  box-shadow: 0 4px 12px var(--risk-glow);
}

.score-row {
  display: flex; align-items: baseline; gap: 4px;
  font-family: var(--font-mono);
}
.score-num { font-size: 18px; font-weight: 700; color: var(--accent-cyan); }
.score-unit { font-size: 10px; color: var(--text-dim); }

.trend {
  font-size: 10px; color: var(--text-dim); margin-top: 2px;
  display: flex; align-items: center; gap: 4px;
}

#mc-container {
  width: 100%; flex: 1; min-height: 60px; margin-top: 4px;
}
</style>
</head>
<body>
<div class="page">
  <div class="card" id="mainCard">
    <span class="risk-pill" id="riskPill">---</span>
    <div class="score-row">
      <span class="score-num" id="riskScore">0.000</span>
      <span class="score-unit">pt</span>
    </div>
    <div class="trend" id="trendText">計測中…</div>
    <div id="mc-container">
      <canvas id="mc"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const SHEETS_API_KEY = params.get('key');
const SHEETS_ID      = '1fBLkhCdThAXbnHnr5ICaeIBT7WyoNh7KevnQLfpIVlA';
const SHEETS_RANGE   = 'シート1!A2:G';

async function fetchSheetData() {
  if (!SHEETS_API_KEY) return null;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(SHEETS_RANGE)}?key=${SHEETS_API_KEY}`;
  try {
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.values || [];
    return rows.filter(r => r.length >= 6 && r[5]).map(r => ({
      t: (r[0]||'').includes(' ') ? r[0].split(' ')[1].substring(0,5) : (r[0]||'').substring(0,5),
      pred: parseFloat(r[5])
    })).filter(r => !isNaN(r.pred));
  } catch (e) { return null; }
}

const LVL = [
  {max:0.5,  lb:'安定',     fg:'#00e5a0', glow:'rgba(0,229,160,.3)'},
  {max:1.4,  lb:'やや注意', fg:'#5de87a', glow:'rgba(93,232,122,.3)'},
  {max:2.96, lb:'注意',     fg:'#ffb830', glow:'rgba(255,184,48,.3)'},
  {max:3.8,  lb:'警戒',     fg:'#ff6438', glow:'rgba(255,100,56,.3)'},
  {max:1e9,  lb:'超警戒',   fg:'#ff4560', glow:'rgba(255,69,96,.35)'}
];
const getLv = v => LVL.find(l => v < l.max) || LVL[4];

let mainChart = null;

function render(data) {
  if (!data || !data.length) return;
  const d = data[data.length - 1];
  const lv = getLv(d.pred);
  const pill = document.getElementById('riskPill');
  pill.textContent = lv.lb;
  pill.style.color = lv.fg;
  pill.style.borderColor = lv.fg;
  document.getElementById('riskScore').textContent = d.pred.toFixed(3);
  document.body.style.setProperty('--risk-glow', lv.glow);

  if (mainChart) mainChart.destroy();
  mainChart = new Chart(document.getElementById('mc'), {
    type: 'line',
    data: {
      labels: data.slice(-12).map(r => r.t),
      datasets: [{
        data: data.slice(-12).map(r => r.pred),
        borderColor: lv.fg,
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
        tension: 0.4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: {display: false} },
      scales: {
        y: { display: false },
        x: { ticks: { display: false }, grid: { display: false } }
      }
    }
  });
}

(async () => {
  const data = await fetchSheetData();
  if (data) render(data);
  setInterval(async () => {
    const data = await fetchSheetData();
    if (data) render(data);
  }, 60000);
})();
</script>
</body>
</html>
